# Default Ultralytics YOLO smoke-test config for the local COCO8 dataset.
model: yolov8n.yaml
data: configs/yolo/coco8_ultralytics.yaml
epochs: 1
imgsz: 320
batch: 4
device: cpu
workers: 0
project: log/yolo
name: coco8_smoke
exist_ok: true
pretrained: false
seed: 42
plots: true
save: true
patience: 20
notes: |
  This config is intentionally small and conservative.
  It is meant for a quick end-to-end smoke test of training, TensorBoard logging, checkpoints, and inference.
  The model starts from the local architecture definition `yolov8n.yaml` to avoid downloading pretrained weights.
